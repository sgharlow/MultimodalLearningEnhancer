<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome AI API - Complete Diagnostic</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        h1 { color: #00ff00; border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
        h2 { color: #ffff00; margin-top: 30px; }
        .section { background: #2a2a2a; padding: 15px; margin: 10px 0; border-left: 4px solid #00ff00; }
        .found { color: #00ff00; font-weight: bold; }
        .notfound { color: #ff0000; font-weight: bold; }
        .warning { color: #ffaa00; font-weight: bold; }
        pre { background: #0a0a0a; padding: 10px; overflow-x: auto; border: 1px solid #333; }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        button:hover { background: #00cc00; }
        .result { margin: 10px 0; padding: 5px; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { padding: 8px; text-align: left; border: 1px solid #333; }
        th { background: #333; color: #ffff00; }
    </style>
</head>
<body>
    <h1>🔍 CHROME AI API - DEFINITIVE DIAGNOSTIC</h1>
    <p>This will check EVERY possible way Chrome AI APIs might be exposed.</p>

    <button onclick="runFullDiagnostic()">🚀 RUN COMPLETE DIAGNOSTIC</button>
    <button onclick="testRealAPICalls()">🧪 TEST REAL API CALLS</button>
    <button onclick="location.reload()">🔄 Refresh Page</button>

    <div id="results"></div>

    <script>
        async function runFullDiagnostic() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>⏳ Running diagnostic...</h2>';

            let output = '';

            // ============================================
            // 1. CHECK DIRECT GLOBALS
            // ============================================
            output += '<div class="section">';
            output += '<h2>1️⃣ Direct Global Objects (Chrome 143+ Style)</h2>';
            output += '<table>';
            output += '<tr><th>API</th><th>Status</th><th>Type</th><th>Has Methods</th></tr>';

            const globalAPIs = [
                'Summarizer',
                'LanguageDetector',
                'LanguageModel',
                'Translator',
                'Writer',
                'Rewriter',
                'Prompt',
                'PromptAPI',
                'AILanguageModel',
                'AISummarizer',
                'AIWriter',
                'AIRewriter'
            ];

            for (const api of globalAPIs) {
                const exists = typeof window[api] !== 'undefined';
                const type = exists ? typeof window[api] : 'undefined';
                let methods = '';

                if (exists && window[api]) {
                    const props = Object.getOwnPropertyNames(window[api]);
                    const funcs = props.filter(p => typeof window[api][p] === 'function');
                    methods = funcs.join(', ') || 'none';
                }

                output += `<tr>
                    <td>${api}</td>
                    <td class="${exists ? 'found' : 'notfound'}">${exists ? '✅ EXISTS' : '❌ NOT FOUND'}</td>
                    <td>${type}</td>
                    <td>${methods}</td>
                </tr>`;
            }
            output += '</table>';
            output += '</div>';

            // ============================================
            // 2. CHECK WINDOW.AI NAMESPACE
            // ============================================
            output += '<div class="section">';
            output += '<h2>2️⃣ window.ai Namespace (Legacy Style)</h2>';

            if (typeof window.ai !== 'undefined') {
                output += '<p class="found">✅ window.ai EXISTS!</p>';
                output += '<table>';
                output += '<tr><th>Property</th><th>Type</th><th>Methods</th></tr>';

                for (const prop in window.ai) {
                    const type = typeof window.ai[prop];
                    let methods = '';
                    if (type === 'object' && window.ai[prop]) {
                        const funcs = Object.getOwnPropertyNames(window.ai[prop])
                            .filter(p => typeof window.ai[prop][p] === 'function');
                        methods = funcs.join(', ');
                    }
                    output += `<tr><td>ai.${prop}</td><td>${type}</td><td>${methods}</td></tr>`;
                }
                output += '</table>';
            } else {
                output += '<p class="notfound">❌ window.ai is UNDEFINED</p>';
            }
            output += '</div>';

            // ============================================
            // 3. CHECK ALL WINDOW PROPERTIES
            // ============================================
            output += '<div class="section">';
            output += '<h2>3️⃣ Scan ALL window properties for AI-related objects</h2>';

            const aiRelatedProps = [];
            for (const prop in window) {
                const lowerProp = prop.toLowerCase();
                if (lowerProp.includes('ai') || lowerProp.includes('language') ||
                    lowerProp.includes('summar') || lowerProp.includes('writer') ||
                    lowerProp.includes('prompt') || lowerProp.includes('rewrite')) {
                    aiRelatedProps.push({
                        name: prop,
                        type: typeof window[prop],
                        value: window[prop]
                    });
                }
            }

            if (aiRelatedProps.length > 0) {
                output += '<p class="found">Found ' + aiRelatedProps.length + ' AI-related properties:</p>';
                output += '<table>';
                output += '<tr><th>Property</th><th>Type</th><th>Constructor</th></tr>';
                for (const p of aiRelatedProps) {
                    const constructor = p.value?.constructor?.name || 'N/A';
                    output += `<tr><td>${p.name}</td><td>${p.type}</td><td>${constructor}</td></tr>`;
                }
                output += '</table>';
            } else {
                output += '<p class="warning">⚠️ No AI-related properties found in window object</p>';
            }
            output += '</div>';

            // ============================================
            // 4. TEST AVAILABILITY METHODS
            // ============================================
            output += '<div class="section">';
            output += '<h2>4️⃣ Test .availability() Methods</h2>';
            output += '<table>';
            output += '<tr><th>API</th><th>Availability Status</th><th>Result</th></tr>';

            // Test Summarizer
            if (typeof Summarizer !== 'undefined' && Summarizer.availability) {
                try {
                    const avail = await Summarizer.availability();
                    output += `<tr><td>Summarizer</td><td class="found">✅ Has .availability()</td><td>${avail}</td></tr>`;
                } catch (e) {
                    output += `<tr><td>Summarizer</td><td class="warning">⚠️ Error</td><td>${e.message}</td></tr>`;
                }
            } else {
                output += `<tr><td>Summarizer</td><td class="notfound">❌ No .availability()</td><td>N/A</td></tr>`;
            }

            // Test LanguageDetector
            if (typeof LanguageDetector !== 'undefined' && LanguageDetector.availability) {
                try {
                    const avail = await LanguageDetector.availability();
                    output += `<tr><td>LanguageDetector</td><td class="found">✅ Has .availability()</td><td>${avail}</td></tr>`;
                } catch (e) {
                    output += `<tr><td>LanguageDetector</td><td class="warning">⚠️ Error</td><td>${e.message}</td></tr>`;
                }
            } else {
                output += `<tr><td>LanguageDetector</td><td class="notfound">❌ No .availability()</td><td>N/A</td></tr>`;
            }

            // Check for other potential APIs
            const potentialAPIs = ['Writer', 'Rewriter', 'LanguageModel', 'Translator'];
            for (const api of potentialAPIs) {
                if (typeof window[api] !== 'undefined' && window[api]?.availability) {
                    try {
                        const avail = await window[api].availability();
                        output += `<tr><td>${api}</td><td class="found">✅ Has .availability()</td><td>${avail}</td></tr>`;
                    } catch (e) {
                        output += `<tr><td>${api}</td><td class="warning">⚠️ Error</td><td>${e.message}</td></tr>`;
                    }
                } else {
                    output += `<tr><td>${api}</td><td class="notfound">❌ Not available</td><td>N/A</td></tr>`;
                }
            }

            output += '</table>';
            output += '</div>';

            // ============================================
            // 5. CHECK CHROME INTERNALS
            // ============================================
            output += '<div class="section">';
            output += '<h2>5️⃣ Chrome Internals Status</h2>';
            output += '<p>Open these pages in new tabs to check:</p>';
            output += '<ul>';
            output += '<li><a href="chrome://on-device-internals" target="_blank">chrome://on-device-internals</a> - Check model status</li>';
            output += '<li><a href="chrome://flags/#optimization-guide-on-device-model" target="_blank">chrome://flags/#optimization-guide-on-device-model</a></li>';
            output += '<li><a href="chrome://flags/#prompt-api-for-gemini-nano" target="_blank">chrome://flags/#prompt-api-for-gemini-nano</a></li>';
            output += '<li><a href="chrome://flags/#summarization-api-for-gemini-nano" target="_blank">chrome://flags/#summarization-api-for-gemini-nano</a></li>';
            output += '<li><a href="chrome://flags/#writer-api-for-gemini-nano" target="_blank">chrome://flags/#writer-api-for-gemini-nano</a></li>';
            output += '<li><a href="chrome://flags/#rewriter-api-for-gemini-nano" target="_blank">chrome://flags/#rewriter-api-for-gemini-nano</a></li>';
            output += '</ul>';
            output += '</div>';

            // ============================================
            // 6. FINAL VERDICT
            // ============================================
            output += '<div class="section">';
            output += '<h2>6️⃣ FINAL VERDICT</h2>';

            const hasSummarizer = typeof Summarizer !== 'undefined';
            const hasLanguageDetector = typeof LanguageDetector !== 'undefined';
            const hasWriter = typeof Writer !== 'undefined';
            const hasRewriter = typeof Rewriter !== 'undefined';
            const hasLanguageModel = typeof LanguageModel !== 'undefined' || (typeof window.ai !== 'undefined' && window.ai?.languageModel);

            output += '<table>';
            output += '<tr><th>API</th><th>Status</th><th>Recommendation</th></tr>';
            output += `<tr>
                <td>Summarizer API</td>
                <td class="${hasSummarizer ? 'found' : 'notfound'}">${hasSummarizer ? '✅ AVAILABLE' : '❌ NOT AVAILABLE'}</td>
                <td>${hasSummarizer ? 'USE FOR SUMMARIES' : 'Use demo mode'}</td>
            </tr>`;
            output += `<tr>
                <td>Prompt/Language Model API</td>
                <td class="${hasLanguageModel ? 'found' : 'notfound'}">${hasLanguageModel ? '✅ AVAILABLE' : '❌ NOT AVAILABLE'}</td>
                <td>${hasLanguageModel ? 'USE FOR DIAGRAMS/NOTES' : 'Use demo mode'}</td>
            </tr>`;
            output += `<tr>
                <td>Writer API</td>
                <td class="${hasWriter ? 'found' : 'notfound'}">${hasWriter ? '✅ AVAILABLE' : '❌ NOT AVAILABLE'}</td>
                <td>${hasWriter ? 'USE FOR STUDY NOTES' : 'Use demo mode or Prompt API'}</td>
            </tr>`;
            output += `<tr>
                <td>Rewriter API</td>
                <td class="${hasRewriter ? 'found' : 'notfound'}">${hasRewriter ? '✅ AVAILABLE' : '❌ NOT AVAILABLE'}</td>
                <td>${hasRewriter ? 'USE FOR CORNELL NOTES' : 'Use demo mode or Prompt API'}</td>
            </tr>`;
            output += '</table>';

            output += '<h3>📋 Summary:</h3>';
            const availableCount = [hasSummarizer, hasLanguageModel, hasWriter, hasRewriter].filter(Boolean).length;
            output += `<p class="${availableCount > 1 ? 'found' : 'warning'}">`;
            output += `${availableCount} out of 4 major APIs are available in your Chrome version.`;
            output += '</p>';

            output += '</div>';

            results.innerHTML = output;
        }

        async function testRealAPICalls() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>🧪 Testing Real API Calls...</h2>';

            let output = '<div class="section">';
            output += '<h2>Real API Call Tests</h2>';

            // Test 1: Create Summarizer
            output += '<h3>Test 1: Create Summarizer Session</h3>';
            try {
                const summarizer = await Summarizer.create({
                    type: 'key-points',
                    format: 'markdown',
                    length: 'short',
                    language: 'en'
                });
                output += '<p class="found">✅ SUCCESS: Summarizer session created!</p>';
                output += '<pre>' + JSON.stringify(summarizer, null, 2) + '</pre>';

                // Try to summarize something
                const testText = "Machine learning is a method of data analysis that automates analytical model building. It is a branch of artificial intelligence based on the idea that systems can learn from data, identify patterns and make decisions with minimal human intervention.";
                const summary = await summarizer.summarize(testText);
                output += '<p class="found">✅ Summarization successful!</p>';
                output += '<p><strong>Original:</strong> ' + testText + '</p>';
                output += '<p><strong>Summary:</strong> ' + summary + '</p>';

                if (summarizer.destroy) summarizer.destroy();
            } catch (e) {
                output += '<p class="notfound">❌ FAILED: ' + e.message + '</p>';
                output += '<pre>' + e.stack + '</pre>';
            }

            // Test 2: Try Language Model (Prompt API)
            output += '<h3>Test 2: Create Language Model Session (Prompt API)</h3>';
            try {
                let session = null;

                // Try Chrome 143 style
                if (typeof LanguageModel !== 'undefined') {
                    session = await LanguageModel.create();
                }
                // Try legacy style
                else if (typeof ai !== 'undefined' && ai.languageModel) {
                    session = await ai.languageModel.create();
                }

                if (session) {
                    output += '<p class="found">✅ SUCCESS: Language Model session created!</p>';
                    output += '<pre>' + JSON.stringify(session, null, 2) + '</pre>';

                    // Try to prompt
                    const response = await session.prompt("Say 'Hello World' if you can hear me.");
                    output += '<p class="found">✅ Prompt successful!</p>';
                    output += '<p><strong>Response:</strong> ' + response + '</p>';

                    if (session.destroy) session.destroy();
                } else {
                    throw new Error('No LanguageModel API found');
                }
            } catch (e) {
                output += '<p class="notfound">❌ FAILED: ' + e.message + '</p>';
                output += '<p class="warning">This is expected in Chrome 143 - Prompt API not exposed as global</p>';
            }

            // Test 3: Try Writer API
            output += '<h3>Test 3: Create Writer Session</h3>';
            try {
                let writer = null;

                if (typeof Writer !== 'undefined') {
                    writer = await Writer.create({ tone: 'formal', format: 'markdown' });
                } else if (typeof ai !== 'undefined' && ai.writer) {
                    writer = await ai.writer.create({ tone: 'formal', format: 'markdown' });
                }

                if (writer) {
                    output += '<p class="found">✅ SUCCESS: Writer session created!</p>';
                    if (writer.destroy) writer.destroy();
                } else {
                    throw new Error('No Writer API found');
                }
            } catch (e) {
                output += '<p class="notfound">❌ FAILED: ' + e.message + '</p>';
                output += '<p class="warning">This is expected in Chrome 143 - Writer API not exposed</p>';
            }

            // Test 4: Try Rewriter API
            output += '<h3>Test 4: Create Rewriter Session</h3>';
            try {
                let rewriter = null;

                if (typeof Rewriter !== 'undefined') {
                    rewriter = await Rewriter.create({ tone: 'as-is', format: 'as-is' });
                } else if (typeof ai !== 'undefined' && ai.rewriter) {
                    rewriter = await ai.rewriter.create({ tone: 'as-is', format: 'as-is' });
                }

                if (rewriter) {
                    output += '<p class="found">✅ SUCCESS: Rewriter session created!</p>';
                    if (rewriter.destroy) rewriter.destroy();
                } else {
                    throw new Error('No Rewriter API found');
                }
            } catch (e) {
                output += '<p class="notfound">❌ FAILED: ' + e.message + '</p>';
                output += '<p class="warning">This is expected in Chrome 143 - Rewriter API not exposed</p>';
            }

            output += '</div>';
            results.innerHTML = output;
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            console.log('Chrome AI Diagnostic loaded. Click "RUN COMPLETE DIAGNOSTIC" button.');
        });
    </script>
</body>
</html>
